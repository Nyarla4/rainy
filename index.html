<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT 산성비</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="start-screen" class="screen active">
        <h1>시작 화면</h1>
        <h2>v.0.0.10</h2>
        <div>
            <span>단어 선택</span>
            <select id="difficulty">
                <option id="N1">N1</option>
                <option id="N2">N2</option>
                <option id="N3">N3</option>
                <option id="N4">N4</option>
                <option id="N5">N5</option>
            </select>
            <span>속도 선택</span>
            <select id="speed">
                <option id="5">5</option>
                <option id="10">10</option>
                <option id="20">20</option>
                <option id="30" selected>30</option>
                <option id="50">50</option>
            </select>
            <button id="start-button">시작</button>
            <div id="words-list"></div>
        </div>
    </div>
    
    <div id="main-screen" class="screen">
        <div id="main-header">
            <div style="font-size:3vh;">
                <span>정답: <span id="correct-count">0</span>/<span class="total-count">0</span></span>
                <span>오답: <span id="wrong-count">0</span>/<span class="total-count">0</span></span>
            </div>
        </div>
        <div id="main-area" style="height: 85vh">

        </div>
        <div id="main-footer">
            <input type="text" id="answer-input" placeholder="정답을 입력하세요" style="height:5vh; font-size:2vh;"/>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>결과 화면</h1>
        <div>
            <span id="total-score"></span>
            <button id="restart-button">다시 시작</button>
        </div>
        <div id="result-words"></div>
    </div>
    <script src="./renderer.js"></script>
</body>
</html>
